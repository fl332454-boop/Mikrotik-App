name: Build Flet Android APK

on:
  push:
    branches: [ "main", "master", "رئيسي" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet routeros-api

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          flet build apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MikrotikHotspotManager-APK
          path: build/apk/**/*.apk
